<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark" />
    <title>Spirit Vale DPS</title>
    <link rel="stylesheet" href="views://mainview/index.css" />
    <script type="module" src="views://mainview/index.js"></script>
  </head>
  <body>
    <main class="app-shell">
      <header class="titlebar electrobun-webkit-app-region-drag">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true"></span>
          <span>Spirit Vale DPS</span>
        </div>
        <div class="window-controls electrobun-webkit-app-region-no-drag">
          <button id="pin-button" class="icon-button" type="button" aria-label="Toggle always on top" title="Always on top">◇</button>
          <button id="minimize-button" class="icon-button" type="button" aria-label="Minimize" title="Minimize">−</button>
          <button id="close-button" class="icon-button close-button" type="button" aria-label="Close" title="Close">×</button>
        </div>
      </header>

      <section class="command-bar">
        <div class="mode-switch" aria-label="Data source">
          <button id="live-mode-button" class="mode-button" type="button">Live</button>
          <button id="replay-mode-button" class="mode-button" type="button">Replay</button>
        </div>
        <button id="open-replay-button" class="secondary-button" type="button">Open log</button>
        <button id="reset-button" class="secondary-button" type="button">Reset</button>
      </section>

      <section class="status-card" aria-live="polite">
        <div class="status-line">
          <span id="status-dot" class="status-dot"></span>
          <span id="status-text">Starting capture…</span>
          <strong id="party-dps" class="party-dps">0 DPS</strong>
        </div>
        <div class="encounter-line">
          <span id="encounter-duration">No encounter</span>
          <select id="encounter-select" aria-label="Encounter"></select>
        </div>
      </section>

      <nav class="tabs" aria-label="Damage views">
        <button id="all-tab" class="tab-button" type="button" role="tab" aria-controls="all-panel">All DPS</button>
        <button id="personal-tab" class="tab-button" type="button" role="tab" aria-controls="personal-panel">Personal</button>
      </nav>

      <section id="all-panel" class="panel" role="tabpanel">
        <div id="all-list" class="meter-list"></div>
      </section>

      <section id="personal-panel" class="panel" role="tabpanel" hidden>
        <form id="personal-form" class="personal-form">
          <label for="personal-name">Character</label>
          <div class="input-row">
            <input id="personal-name" type="text" maxlength="64" autocomplete="off" placeholder="Enter display name" />
            <button class="secondary-button" type="submit">Save</button>
          </div>
          <label class="actor-label" for="personal-actor">Damage actor</label>
          <select id="personal-actor" aria-label="Personal damage actor"></select>
        </form>
        <p id="personal-hint" class="personal-hint"></p>
        <div id="personal-list" class="meter-list"></div>
      </section>
    </main>
  </body>
</html>
