<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark" />
    <title>Spirit Vale DPS Settings</title>
    <link rel="stylesheet" href="views://dpssettingsview/theme.css" />
    <link rel="stylesheet" href="views://dpssettingsview/index.css" />
    <script type="module" src="views://dpssettingsview/index.js"></script>
  </head>
  <body>
    <main class="app-shell">
      <header id="titlebar" class="titlebar">
        <div class="brand"><img class="brand-icon" src="views://assets/app-icon.png" alt="" /><span>Spirit Vale</span><span class="brand-tag">DPS Settings</span></div>
        <div class="window-controls">
          <button id="minimize-button" class="icon-button" type="button" aria-label="Minimize" title="Minimize">−</button>
          <button id="close-button" class="icon-button close-button" type="button" aria-label="Close" title="Close">×</button>
        </div>
      </header>
      <section class="settings-content" aria-label="DPS settings">
        <header><h1>Overlay opacity</h1><p>Adjust how transparent the DPS overlay appears.</p></header>
        <label class="opacity-field" for="opacity-slider"><span>Opacity</span><output id="opacity-value" for="opacity-slider">100%</output><input id="opacity-slider" type="range" min="20" max="100" step="5" value="100" /></label>
      </section>
    </main>
  </body>
</html>
