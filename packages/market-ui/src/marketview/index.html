<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark" />
    <title>Spirit Vale Market</title>
    <link rel="stylesheet" href="views://marketview/theme.css" />
    <link rel="stylesheet" href="views://marketview/index.css" />
    <script type="module" src="views://marketview/index.js"></script>
  </head>
  <body>
    <main class="app-shell">
      <header id="titlebar" class="titlebar">
        <div class="brand"><img class="brand-icon" src="views://assets/app-icon.png" alt="" /><span>Spirit Vale</span><span class="brand-tag">Market</span></div>
        <div class="window-controls">
          <button id="minimize-button" class="icon-button" type="button" aria-label="Minimize" title="Minimize">−</button>
          <button id="maximize-button" class="icon-button" type="button" aria-label="Maximize" title="Maximize">▢</button>
          <button id="close-button" class="icon-button close-button" type="button" aria-label="Close" title="Close">×</button>
        </div>
      </header>

      <section class="search-bar">
        <label class="field" for="market-query">
          <span aria-hidden="true">⌕</span>
          <input id="market-query" type="search" maxlength="200" autocomplete="off" placeholder="Search items, sellers, shops, or maps" />
        </label>
        <button id="filter-button" class="btn" type="button">
          Filters <span id="filter-count" class="filter-count" hidden>0</span>
        </button>
      </section>

      <section class="status-strip" aria-live="polite">
        <div class="status-readout"><span id="status-dot" class="status-dot is-idle"></span><span id="status-text">Looking for a market session…</span></div>
        <strong id="result-count" class="t-data">0 results</strong>
      </section>

      <section id="results" class="results" aria-label="Market listings"></section>
      <div class="load-more-row"><button id="load-more-button" class="btn" type="button" hidden>Load more</button></div>
    </main>
  </body>
</html>
