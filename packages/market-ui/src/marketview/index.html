<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark" />
    <title>Spirit Vale Market</title>
    <link rel="stylesheet" href="views://marketview/index.css" />
    <script type="module" src="views://marketview/index.js"></script>
  </head>
  <body>
    <main class="app-shell">
      <header class="titlebar electrobun-webkit-app-region-drag">
        <div class="brand"><span class="brand-mark" aria-hidden="true"></span><span>Spirit Vale Market</span></div>
        <div class="window-controls electrobun-webkit-app-region-no-drag">
          <button id="minimize-button" class="icon-button" type="button" aria-label="Minimize">−</button>
          <button id="close-button" class="icon-button close-button" type="button" aria-label="Close">×</button>
        </div>
      </header>

      <section class="search-bar">
        <label class="search-field" for="market-query">
          <span aria-hidden="true">⌕</span>
          <input id="market-query" type="search" maxlength="200" autocomplete="off" placeholder="Search items, sellers, shops, or maps" />
        </label>
        <button id="filter-button" class="filter-button" type="button">
          Filters <span id="filter-count" class="filter-count" hidden>0</span>
        </button>
      </section>

      <section class="status-card" aria-live="polite">
        <span id="status-dot" class="status-dot"></span>
        <span id="status-text">Looking for a market session…</span>
        <strong id="result-count">0 results</strong>
      </section>

      <section id="results" class="results" aria-label="Market listings"></section>
      <div class="load-more-row"><button id="load-more-button" class="secondary-button" type="button" hidden>Load more</button></div>
    </main>

    <dialog id="filter-dialog" aria-labelledby="filter-title">
      <form id="filter-form" class="filter-modal" method="dialog">
        <header class="modal-header">
          <div><h1 id="filter-title">Stat filters</h1><p>Checked stats must all match. Blank ranges require the stat at any value.</p></div>
          <button id="filter-close-button" class="modal-close" type="button" aria-label="Close filters">×</button>
        </header>
        <label class="stat-search" for="stat-query">
          <span aria-hidden="true">⌕</span>
          <input id="stat-query" type="search" autocomplete="off" placeholder="Search stats" />
        </label>
        <div class="stat-head" aria-hidden="true"><span>Use / stat</span><span>Minimum</span><span>Maximum</span></div>
        <div id="stat-list" class="stat-list"></div>
        <p id="filter-error" class="filter-error" role="alert"></p>
        <footer class="modal-actions">
          <button id="clear-filters-button" class="text-button" type="button">Clear all</button>
          <button id="cancel-filters-button" class="secondary-button" type="button">Cancel</button>
          <button class="primary-button" type="submit">Apply filters</button>
        </footer>
      </form>
    </dialog>
  </body>
</html>
