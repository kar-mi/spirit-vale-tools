<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark" />
    <title>Spirit Vale Market Filters</title>
    <link rel="stylesheet" href="views://marketfiltersview/theme.css" />
    <link rel="stylesheet" href="views://marketfiltersview/index.css" />
    <script type="module" src="views://marketfiltersview/index.js"></script>
  </head>
  <body>
    <main class="app-shell">
      <header id="titlebar" class="titlebar">
        <div class="brand"><span>Spirit Vale</span><span class="brand-tag">Market Filters</span></div>
        <div class="window-controls">
          <button id="minimize-button" class="icon-button" type="button" aria-label="Minimize" title="Minimize">−</button>
          <button id="close-button" class="icon-button close-button" type="button" aria-label="Close" title="Close">×</button>
        </div>
      </header>
      <form id="filter-form" class="filter-form">
        <header class="filter-head">
          <div><h1>Stat filters</h1><p>Checked stats must all match. Blank ranges require the stat at any value.</p></div>
        </header>
        <label class="field stat-search" for="stat-query">
          <span aria-hidden="true">⌕</span>
          <input id="stat-query" type="search" autocomplete="off" placeholder="Search stats" />
        </label>
        <div class="stat-head t-label" aria-hidden="true"><span>Use / stat</span><span>Minimum</span><span>Maximum</span></div>
        <div id="stat-list" class="stat-list"></div>
        <p id="filter-error" class="filter-error" role="alert"></p>
        <footer class="filter-actions">
          <button id="clear-filters-button" class="btn btn-ghost" type="button">Clear all</button>
          <button id="cancel-filters-button" class="btn" type="button">Cancel</button>
          <button class="btn btn-primary" type="submit">Apply filters</button>
        </footer>
      </form>
    </main>
  </body>
</html>
