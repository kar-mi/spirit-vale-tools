<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark" />
    <title>Spirit Vale DPS</title>
    <link rel="stylesheet" href="views://mainview/theme.css" />
    <link rel="stylesheet" href="views://mainview/index.css" />
    <script type="module" src="views://mainview/index.js"></script>
  </head>
  <body>
    <main class="app-shell">
      <header class="titlebar electrobun-webkit-app-region-drag">
        <div class="brand"><span>Spirit Vale</span><span class="brand-tag">DPS</span></div>
        <div class="window-controls electrobun-webkit-app-region-no-drag">
          <button id="pin-button" class="icon-button" type="button" aria-label="Toggle always on top" title="Always on top">◇</button>
          <button id="minimize-button" class="icon-button" type="button" aria-label="Minimize" title="Minimize">−</button>
          <button id="close-button" class="icon-button close-button" type="button" aria-label="Close" title="Close">×</button>
        </div>
      </header>

      <section class="command-bar">
        <div class="seg" aria-label="Data source">
          <button id="live-mode-button" type="button">Live</button>
          <button id="replay-mode-button" type="button">Replay</button>
        </div>
        <button id="open-replay-button" class="btn" type="button">Open log</button>
        <button id="reset-button" class="btn" type="button">Reset</button>
      </section>

      <section class="status-strip" aria-live="polite">
        <div class="status-readout"><span id="status-dot" class="status-dot is-idle"></span><span id="status-text">Starting capture…</span></div>
        <div class="stat-tiles dps-tiles">
          <article class="stat-tile"><span class="t-label">Party DPS</span><strong id="party-dps" class="t-data">0</strong></article>
          <article class="stat-tile">
            <span class="t-label">Encounter</span>
            <span id="encounter-duration" class="t-data">—</span>
            <select id="encounter-select" class="input" aria-label="Encounter" hidden></select>
          </article>
        </div>
      </section>

      <nav class="seg tabs" role="tablist" aria-label="Damage views">
        <button id="all-tab" type="button" role="tab" aria-controls="all-panel">All DPS</button>
        <button id="personal-tab" type="button" role="tab" aria-controls="personal-panel">Personal</button>
      </nav>

      <section id="all-panel" class="panel" role="tabpanel">
        <div id="all-list" class="meter-list"></div>
      </section>

      <section id="personal-panel" class="panel" role="tabpanel" hidden>
        <form id="personal-form" class="personal-form">
          <label class="t-label" for="personal-name">Character</label>
          <div class="input-row">
            <input id="personal-name" class="input" type="text" maxlength="64" autocomplete="off" placeholder="Enter display name" />
            <button class="btn" type="submit">Save</button>
          </div>
          <label class="t-label actor-label" for="personal-actor">Damage actor</label>
          <select id="personal-actor" class="input" aria-label="Personal damage actor"></select>
        </form>
        <p id="personal-hint" class="personal-hint"></p>
        <div id="personal-list" class="meter-list"></div>
      </section>
    </main>
  </body>
</html>
