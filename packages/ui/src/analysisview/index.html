<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark" />
    <title>Spirit Vale Combat Analysis</title>
    <link rel="stylesheet" href="views://analysisview/theme.css" />
    <link rel="stylesheet" href="views://analysisview/index.css" />
    <script type="module" src="views://analysisview/index.js"></script>
  </head>
  <body>
    <main class="app-shell">
      <header id="titlebar" class="titlebar">
        <div class="brand"><span>Spirit Vale</span><span class="brand-tag">Analysis</span></div>
        <div class="window-controls">
          <button id="minimize-button" class="icon-button" type="button" aria-label="Minimize" title="Minimize">−</button>
          <button id="close-button" class="icon-button close-button" type="button" aria-label="Close" title="Close">×</button>
        </div>
      </header>
      <section class="analysis-content">
        <section class="toolbar">
          <label class="encounter-picker"><span class="t-label">Encounter</span><select id="encounter-select" class="input" aria-label="Encounter"></select></label>
          <div class="toolbar-meta"><span id="file-name" class="pill">Loading…</span><span id="status" class="status-readout" aria-live="polite">Loading combat log…</span></div>
        </section>
        <p id="warning" class="banner is-warn" hidden></p>
        <section class="stat-tiles totals" aria-label="Encounter totals">
          <article class="stat-tile"><span class="t-label">Party DPS</span><strong id="party-dps" class="t-data">0</strong></article>
          <article class="stat-tile"><span class="t-label">Total damage</span><strong id="total-damage" class="t-data">0</strong></article>
          <article class="stat-tile"><span class="t-label">Duration</span><strong id="duration" class="t-data">—</strong></article>
          <article class="stat-tile"><span class="t-label">Players</span><strong id="player-count" class="t-data">0</strong></article>
        </section>
        <section class="players-section" aria-label="Player analysis">
          <div class="section-head"><h1>Player damage</h1><p>Double-click a player for skills and damage over time.</p></div>
          <div id="player-list" class="list"></div>
          <p id="empty-state" class="empty-state" hidden>No player damage was found for this encounter.</p>
        </section>
      </section>
    </main>
  </body>
</html>
