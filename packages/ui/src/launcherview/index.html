<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark" />
    <title>Spirit Vale</title>
    <link rel="stylesheet" href="views://launcherview/theme.css" />
    <link rel="stylesheet" href="views://launcherview/index.css" />
    <script type="module" src="views://launcherview/index.js"></script>
  </head>
  <body>
    <main class="app-shell">
      <header id="titlebar" class="titlebar">
        <div class="brand"><span>Spirit Vale</span><span class="brand-tag">Tools</span></div>
        <div class="window-controls">
          <button id="settings-button" class="icon-button" type="button" aria-label="Packet capture settings" title="Packet capture settings">⚙</button>
          <button id="minimize-button" class="icon-button" type="button" aria-label="Minimize" title="Minimize">−</button>
          <button id="close-button" class="icon-button close-button" type="button" aria-label="Close" title="Close">×</button>
        </div>
      </header>

      <section class="launcher-content">
        <div id="capture-status" class="capture-status" aria-live="polite">
          <span id="status-dot" class="status-dot is-idle"></span>
          <div><strong>Central capture</strong><p id="status-text">Starting centralized capture…</p></div>
        </div>

        <div class="tool-grid" aria-label="Spirit Vale tools">
          <button class="tool-button" data-tool="combat" type="button"><strong>Combat</strong><span>Live DPS and combat replay</span></button>
          <button class="tool-button" data-tool="rewards" type="button"><strong>Rewards</strong><span>Mob rewards and catalog</span></button>
          <button class="tool-button" data-tool="market" type="button"><strong>Market</strong><span>Captured listings and filters</span></button>
        </div>
      </section>

      <section id="settings-panel" class="settings-panel" aria-label="Packet capture settings" hidden>
        <div class="settings-heading"><div><strong>Packet capture</strong><p>Npcap is provided by your system.</p></div><button id="settings-close-button" class="icon-button" type="button" aria-label="Close settings">×</button></div>
        <div class="settings-row"><span>Backend</span><strong>Npcap</strong></div>
        <div class="settings-row settings-status"><span>Status</span><div><strong id="npcap-status">Checking…</strong><p id="npcap-detail"></p></div></div>
        <label class="settings-field" for="adapter-select"><span>Network adapter</span><select id="adapter-select" class="input"><option value="auto">Automatic</option></select></label>
        <p id="adapter-detail" class="settings-hint"></p>
        <div class="settings-actions"><button id="refresh-adapters-button" class="btn" type="button">Refresh</button><button id="install-npcap-button" class="btn primary" type="button">Get Npcap</button></div>
      </section>
    </main>
  </body>
</html>
