<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="dark">
  <title>Spirit Vale Mob Catalog</title>
  <link rel="stylesheet" href="theme.css">
  <link rel="stylesheet" href="index.css">
</head>
<body>
  <header id="titlebar" class="titlebar">
    <div class="brand"><span>Spirit Vale</span><span class="brand-tag">Mob Catalog</span></div>
    <div class="window-controls">
      <button id="minimize-button" class="icon-button" type="button" aria-label="Minimize" title="Minimize">−</button>
      <button id="maximize-button" class="icon-button" type="button" aria-label="Maximize" title="Maximize">▢</button>
      <button id="close-button" class="icon-button close-button" type="button" aria-label="Close" title="Close">×</button>
    </div>
  </header>
  <main>
    <div class="catalog-head">
      <div><h1>Mob catalog</h1><p>Build-matched base values before party and status modifiers.</p></div>
      <span id="catalog-count" class="pill">0 mobs</span>
    </div>
    <label class="field catalog-search">
      <span aria-hidden="true">⌕</span>
      <input id="catalog-query" type="search" placeholder="Search mob name or ID…" autocomplete="off">
    </label>
    <div id="catalog-list" class="list catalog-list"></div>
  </main>
  <script type="module" src="index.js"></script>
</body>
</html>
