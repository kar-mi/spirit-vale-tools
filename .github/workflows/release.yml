name: Build and Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  windows-portable:
    name: Build Windows portable ZIP
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate release tag
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $package = Get-Content package.json -Raw | ConvertFrom-Json
          $expectedTag = "v$($package.version)"
          if ($env:GITHUB_REF_NAME -ne $expectedTag) {
            throw "Release tag $env:GITHUB_REF_NAME does not match package.json version $($package.version). Expected $expectedTag."
          }

      - name: Type-check
        run: bun run typecheck

      - name: Test
        run: bun test

      - name: Build portable ZIP
        run: bun run package:portable

      - name: Verify portable ZIP
        run: bun run verify:portable

      - name: Upload dry-run artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: spirit-vale-portable-${{ github.run_number }}
          path: |
            dist/releases/Spirit-Vale-portable-win-x64-v*.zip
            dist/releases/Spirit-Vale-portable-win-x64-v*.zip.sha256
          retention-days: 7

      - name: Create GitHub Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create $env:GITHUB_REF_NAME `
            dist/releases/Spirit-Vale-portable-win-x64-v*.zip `
            dist/releases/Spirit-Vale-portable-win-x64-v*.zip.sha256 `
            --verify-tag `
            --generate-notes `
            --title "Spirit Vale $env:GITHUB_REF_NAME"
