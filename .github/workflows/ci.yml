name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - name: Install Bun dependencies
        run: bun install --frozen-lockfile
      - name: Typecheck Bun package
        run: bun run typecheck
      - name: Test Bun package
        run: bun test
      - name: Build Windows desktop package
        run: bun run build
      - name: Upload Windows desktop package
        uses: actions/upload-artifact@v4
        with:
          name: spiritvale-win-x64
          path: packages/ui/dist/electrobun
          if-no-files-found: error
